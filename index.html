<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surat Untukmu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://nightcode-credit.netlify.app/style.css"
    />
  </head>
  <body>
    <div class="stars"></div>

    <audio id="bgMusic" autoplay loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <div class="music-control" onclick="toggleMusic()" id="musicBtn">
      🎵 Music On
    </div>

    <div class="moon"></div>

    <div class="container">
      <h1 id="title">Untuk Seseorang ✨</h1>

      <div class="nameBox" id="nameBox">
        <input type="text" id="username" placeholder="Masukkan namamu..." />
        <button class="btn" onclick="startLetter()">Buka Surat 💌</button>
      </div>
      <p id="text" style="display: none"></p>

      <button
        class="btn"
        id="mainBtn"
        onclick="nextMessage()"
        style="display: none"
      >
        Lanjut
      </button>

      <div class="final" id="finalText"></div>
    </div>

    <script>
      let userName = "";

      const messages = [
        "Entah sejak kapan...\naku mulai menunggu pesan darimu setiap hari.",

        "Hal kecil tentangmu\nselalu berhasil membuat hariku lebih baik.",

        "Aku suka caramu tertawa,\ncaramu bercerita,\ndan caramu hadir tanpa sadar mengubah semuanya.",

        "Mungkin ini terdengar sederhana...\ntapi aku benar-benar nyaman saat bersamamu.",

        "Dan jika suatu hari\nkamu membaca surat ini sampai akhir...",

        "Aku cuma ingin kamu tahu...\naku menyukaimu. ❤️",
      ];

      let index = 0;

      function startLetter() {
        const input = document.getElementById("username");
        const text = document.getElementById("text");
        const button = document.getElementById("mainBtn");
        const box = document.getElementById("nameBox");
        const title = document.getElementById("title");

        // cek nama kosong
        if (input.value.trim() === "") {
          input.placeholder = "Eits... isi namanya dulu ✨";

          input.classList.add("shake");

          setTimeout(() => {
            input.classList.remove("shake");
          }, 500);

          return;
        }

        userName = input.value;

        createSparkles();

        title.innerHTML = `Untuk ${userName} ✨`;

        box.style.display = "none";
        text.style.display = "block";
        button.style.display = "inline-block";

        typeWriter(
          `Hai ${userName}...

Aku punya sesuatu yang ingin aku sampaikan.`,
          text,
        );
      }

      function sendMessage() {
        createExplosion();
        const phoneNumber = "628123456789";
        const message = encodeURIComponent(
          "Hai... aku sudah membaca suratmu 🤍",
        );

        setTimeout(() => {
          window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");
        }, 1200);
      }
    </script>
    <script src="https://nightcode-credit.netlify.app/script.js"></script>
    <script src="https://nightcode-credit.netlify.app/credit.js"></script>
  </body>
</html>
